<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>God's Eye Dashboard</title>
    <meta
      name="description"
      content="BTC, VIX, DXY, US10Y, Nasdaq 100, S&P 500 및 Fear & Greed를 한 화면에서 모니터링하는 대시보드"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+KR:wght@400;500;600;700&family=Space+Grotesk:wght@500;700&display=swap"
      rel="stylesheet"
    />
    <script src="https://cdn.tailwindcss.com" defer></script>
    <link rel="stylesheet" href="./styles.css" />
    <script src="./app.js" defer></script>
  </head>
  <body class="antialiased">
    <div class="bg-orb bg-orb-left"></div>
    <div class="bg-orb bg-orb-right"></div>

    <header class="page-header mx-auto max-w-[1800px]">
      <div>
        <p class="eyebrow">Market Correlation Viewport</p>
        <h1>God's Eye</h1>
      </div>
      <div class="header-actions">
        <button id="edit-toggle-btn" class="btn btn-outline" type="button">편집</button>
        <button id="layout-cancel-btn" class="btn btn-outline" type="button" hidden>취소</button>
      </div>
    </header>

    <section id="layout-toolbar" class="layout-toolbar card mx-auto max-w-[1800px]" hidden>
      <div class="layout-toolbar-actions">
        <button id="layout-add-btn" class="btn btn-outline" type="button">추가</button>
        <button id="layout-ai-add-btn" class="btn btn-outline" type="button">AI 추가</button>
      </div>
      <p class="layout-toolbar-note">
        현재 차트 엔진은 TradingView iframe 기준으로 동작하며 차트 간 커서 점선 동기화는 지원하지 않습니다.
      </p>
    </section>

    <main id="dashboard-grid" class="dashboard-grid mx-auto max-w-[1800px]"></main>

    <section class="ticker-floating" aria-label="실시간 티커">
      <div class="ticker-floating-inner">
        <div class="tradingview-widget-container ticker-host">
          <div id="ticker-widget" class="tradingview-widget-container__widget"></div>
        </div>
        <p id="ticker-status" class="widget-status" hidden>
          티커 위젯 로딩이 지연되고 있습니다.
        </p>
      </div>
    </section>

    <div id="symbol-modal" class="modal-root" hidden>
      <div class="modal-backdrop" data-close-modal="symbol"></div>
      <section class="modal-panel" role="dialog" aria-modal="true" aria-labelledby="symbol-modal-title">
        <h2 id="symbol-modal-title">심볼 추가</h2>
        <label class="field-label" for="symbol-input">거래소:심볼</label>
        <input id="symbol-input" class="field-input" type="text" placeholder="예: NASDAQ:TSLA" />
        <label class="field-label" for="title-input">표시명</label>
        <input id="title-input" class="field-input" type="text" placeholder="예: Tesla" />
        <p id="symbol-modal-error" class="field-error" hidden></p>
        <div class="modal-actions">
          <button id="symbol-modal-submit" class="btn btn-primary" type="button">추가</button>
          <button id="symbol-modal-cancel" class="btn btn-outline" type="button">닫기</button>
        </div>
      </section>
    </div>

    <div id="ai-modal" class="modal-root" hidden>
      <div class="modal-backdrop" data-close-modal="ai"></div>
      <section class="modal-panel" role="dialog" aria-modal="true" aria-labelledby="ai-modal-title">
        <h2 id="ai-modal-title">AI 추천 심볼</h2>
        <p id="ai-modal-status" class="ai-modal-status">추천 목록을 준비하는 중입니다.</p>
        <div id="ai-suggest-list" class="ai-suggest-list"></div>
        <div class="modal-actions">
          <button id="ai-modal-apply" class="btn btn-primary" type="button">선택 반영</button>
          <button id="ai-modal-cancel" class="btn btn-outline" type="button">닫기</button>
        </div>
      </section>
    </div>
  </body>
</html>
